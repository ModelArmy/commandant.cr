name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, crystal: latest }
          - { os: macos-latest, crystal: latest }
          - { os: macos-15-intel, crystal: latest }
          - { os: windows-latest, crystal: "1.20" }

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{matrix.crystal}}

      - name: Cache shards
        uses: actions/cache@v5
        with:
          path: |
            lib
            bin/ameba
          key: ${{ runner.os }}-shards-${{ hashFiles('**/shard.lock') }}

      - name: Install shards
        run: shards check || shards install

      # ---- Build debug release and check code quality on one platform

      - name: Checkout core rulesets for running tests
        if: ${{ runner.os == 'Linux' }}
        uses: actions/checkout@v6
        with:
          repository: ModelArmy/commandant-rules-core
          path: tmp

      - name: Install shards
        if: ${{ runner.os == 'Linux' }}
        run: shards check || shards install

      - name: Setup debug environment (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: mkdir -p bin/debug

      - name: Build Debug (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: SHARDS_BIN_PATH=bin/debug shards build --debug

      - name: Check formatting (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: crystal tool format; git diff --exit-code src

      - name: Run static code analysis (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: bin/ameba src/

      - name: Run tests (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          mkdir -p spec/fixtures;
          ln -s tmp/commandant-rules-core/rulesets spec/fixtures/rulesets;
          ls -lah spec/fixtures;
          crystal spec -Dtest

      # ---- Build releases on all platforms

      - name: Install shards
        if: ${{ runner.os != 'Linux' }}
        run: shards check --production || shards install --production

      # Non-Windows
      - name: Setup release environment
        if: ${{ runner.os != 'Windows' }}
        run: mkdir -p bin/release

      - name: Build Release
        if: ${{ runner.os != 'Windows' }}
        run: SHARDS_BIN_PATH=bin/release shards build --release

      - name: Run Sample `md2term`
        if: ${{ runner.os != 'Windows' }}
        run: 'bin/release/assess 2>&1 | grep "Usage: assess"'

      # Ah, Windows.
      - name: Setup release environment (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: |
          mkdir bin -ErrorAction SilentlyContinue
          mkdir bin\release -ErrorAction SilentlyContinue

      - name: Build Release (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        env:
          SHARDS_BIN_PATH: "bin/release"
        run: |
          shards build --release
